# docs/generate/testkit_examples/config.yaml
game_dir: examples/state_exporter/cmd
normalize:
  # Normalize memory addresses
  - pattern: '_addr="[^"]*"'
    replace: '_addr="<ADDR>"'

  # Normalize timestamps in game logs
  - pattern: '\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+'
    replace: '<TIMESTAMP>'

  # Normalize PIDs
  - pattern: 'PID=\d+'
    replace: 'PID=<PID>'

  # Normalize test timing (e.g., "0.123s", "1.45s")
  - pattern: '\d+\.\d+s'
    replace: '<TIME>'

  # Normalize socket paths with timestamps
  - pattern: 'autoebiten-testkit-\d+-\d+\.sock'
    replace: 'autoebiten-testkit-<ID>.sock'

  # Normalize temporary directory paths
  - pattern: '/tmp/autoebiten-[^/]+'
    replace: '/tmp/autoebiten-<ID>'
